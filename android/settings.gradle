pluginManagement {
    includeBuild(new File("cmd /c node --print \"require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })\"".execute(null, rootDir).text.trim()).getParentFile().toString())
}
plugins { id("com.facebook.react.settings") }

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  def command = [
    'cmd', '/c', 'node',
    '--no-warnings',
    '--eval',
    'require(require.resolve(\'expo-modules-autolinking\', { paths: [require.resolve(\'expo/package.json\')] }))(process.argv.slice(1))',
    'react-native-config',
    '--json',
    '--platform',
    'android'
  ].toList()
  ex.autolinkLibrariesFromCommand(command)
}

rootProject.name = 'CF'

dependencyResolutionManagement {
  versionCatalogs {
    reactAndroidLibs {
      from(files(new File("cmd /c node --print \"require.resolve('react-native/package.json')\"".execute(null, rootDir).text.trim(), "../gradle/libs.versions.toml")))
    }
  }
}

apply from: new File("cmd /c node --print \"require.resolve('expo/package.json')\"".execute(null, rootDir).text.trim(), "../scripts/autolinking.gradle");
useExpoModules()

include ':app'

// Explicitly include expo-modules-core since autolinking 'resolve' doesn't list it
// but expo/android/build.gradle requires project(':expo-modules-core')
// Using nested copy inside expo/node_modules since root copy is incomplete
include ':expo-modules-core'
project(':expo-modules-core').projectDir = new File(rootDir, "../node_modules/expo/node_modules/expo-modules-core/android")

includeBuild(new File("cmd /c node --print \"require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })\"".execute(null, rootDir).text.trim()).getParentFile())
